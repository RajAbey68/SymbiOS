version: "3.8"

services:
  symbios-db:
    image: postgres:15-alpine
    container_name: role_os_postgres
    environment:
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: roleos
    ports:
      - "5432:5432"
    volumes:
      - role_os_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  role_os_data:
